# See https://bioconda.github.io/recipes.html for guidelines
{% set name = "bit-pop" %}
{% set version = "0.2.0" %}
{% set build_number = 0 %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://github.com/mladenpop-oss/bit-pop/archive/v{{ version }}.tar.gz"
  sha256: "2e592737c17ab11388a170936b118259e9967746b6950b596790d45fcfa54d31"

build:
  number: {{ build_number }}
  script: cargo build --release --locked && install -D -m 755 target/release/bit-pop $PREFIX/bin/bit-pop
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - pkg-config
    - zlib
  run:
    - openssl >=3.0
    - zlib
  run_constrained:
    - rust >=1.70

test:
  commands:
    - bit-pop --help
    - test -x $PREFIX/bin/bit-pop

about:
  home: "https://github.com/mladenpop-oss/bit-pop"
  license: "MIT"
  summary: "Ultra-fast multi-genome DNA read classification"
  description: |
    Bit-Pop maps DNA reads across dozens of genomes using a compact FM-index
    built in Rust with bit-level parallelism. Ideal for metagenomic classification.
  doc_url: "https://github.com/mladenpop-oss/bit-pop#readme"
  dev_url: "https://github.com/mladenpop-oss/bit-pop"

extra:
  recipe-maintainers:
    - mladenpop-oss
